name: Server — Build & Deploy

on:
  push:
    branches: [main, master]
    paths:
      - 'server/**'
      - '.github/workflows/server-deploy.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'server/**'

jobs:
  build:
    name: Validate Server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./server

      - name: Run tests (if configured)
        run: npm run test --if-present
        working-directory: ./server

  # ── Deploy to Railway ──────────────────────────────────────────────────────
  # Railway auto-deploys from GitHub when you connect the repo in their dashboard.
  # The job below is an explicit deploy trigger using Railway CLI as an alternative.
  # Uncomment and configure once you have a Railway project set up.
  #
  deploy:
    name: Deploy to Railway
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
  
    steps:
      - uses: actions/checkout@v4
  
      - name: Install Railway CLI
        run: npm install -g @railway/cli
  
      - name: Deploy to Railway
        run: railway up --service=server
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
